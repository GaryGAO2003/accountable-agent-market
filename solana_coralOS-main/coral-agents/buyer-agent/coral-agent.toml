# Agent manifest — coral-server reads this to discover, launch, and configure the agent.
# Docs: https://docs.coralos.ai/reference/agent · [options] table
# https://docs.coralos.ai/reference/agent/tables/options · docker runtime
# https://docs.coralos.ai/reference/agent/tables/runtimes/docker · whole-kit walkthrough /CORAL.md
edition = 4

[agent]
name = "buyer-agent"
version = "0.1.0"
description = "LLM-driven marketplace buyer. Broadcasts a WANT, collects competing bids, picks best value, and settles via arbiter-gated escrow."
summary = "Autonomous TypeScript buyer that runs an open TxODDS market and settles through a neutral arbiter."
readme = "Market loop: WANT -> collect BIDs -> AWARD best value -> open arbiter escrow -> release on verified delivery."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
BUYER_KEYPAIR_B58 = { type = "string", description = "Base58-encoded devnet keypair - signs deposit/release" }
ARBITER_KEYPAIR_B58 = { type = "string", default = "", description = "Base58-encoded neutral arbiter keypair for arbiter settlement" }
ARBITER_PROGRAM_ID = { type = "string", default = "", description = "Override arbiter wrapper program id; useful for local/forked arbiter deployments" }
AGENT_NAME = { type = "string", default = "buyer-agent", description = "Market identity (matches the registry name)" }
SELLER_WALLET = { type = "string", default = "", description = "Legacy alias for EXPECTED_SELLER_WALLET - the buyer reads it as a fallback when EXPECTED_SELLER_WALLET is unset" }
EXPECTED_SELLER_WALLET = { type = "string", default = "", description = "Egress PEP recipient allowlist: the payout wallet the buyer expects sellers to be paid at (personas share one in the demo). Non-empty binds it as the sole approved payout - an ESCROW_REQUIRED naming a different seller= trips RECIPIENT_NOT_ALLOWED before any deposit (F3). Falls back to SELLER_WALLET" }
BUYER_MAX_SOL = { type = "f64", default = 0.001, description = "Budget cap per round (the WANT budget)" }
BUYER_MAX_TX_PER_MIN = { type = "f64", default = 30, description = "Egress PEP velocity cap: max money actions (deposit/release/refund) per rolling 60s across all rounds (default 30 = well above the natural cadence; lower it to demo the throttle)" }
BUYER_SESSION_BUDGET_SOL = { type = "f64", default = 0, description = "Egress PEP budget cap: cumulative deposit spend for the whole session in SOL (0 = no cap)" }
REP_FLAG_THRESHOLD = { type = "f64", default = -3, description = "L3 reputation: score at/below which a seller is flagged and frozen out of future awards (inclusive). One fraud (-3) flags by default" }
REP_TRUST_THRESHOLD = { type = "f64", default = 2, description = "L3 reputation: score at/above which a seller reads trusted (inclusive). One clean delivery (+2) earns trust by default" }
REP_MEMO = { type = "string", default = "1", description = "L3 reputation: 1 (default) anchors each standing change on-chain via an SPL memo (~5k lamports/write); 0 keeps the trail thread-only (no memo fee)" }
BUYER_SERVICE = { type = "string", default = "txline", description = "Service to shop for (sellers self-select on it)" }
BUYER_ARG = { type = "string", default = "edge 18175397", description = "Argument passed to the winning seller's deliverService" }
BUYER_ARGS = { type = "string", default = "", description = "Comma-separated args to rotate through, one per round (overrides BUYER_ARG)" }
MARKET_SELLERS = { type = "string", default = "seller-worldcup,seller-fast,seller-premium", description = "Comma-separated seller names in the market thread" }
ARBITER_AGENT_ENABLED = { type = "string", default = "", description = "Set to 1 to delegate objective re-exec + release/refund to arbiter-agent" }
ARBITER_AGENT_NAME = { type = "string", default = "arbiter-agent", description = "CoralOS agent name for the neutral arbiter" }
CHALLENGER_AGENT_ENABLED = { type = "string", default = "", description = "Set to 1 to include challenger-agent during the optimistic challenge window" }
CHALLENGER_AGENT_NAME = { type = "string", default = "challenger-agent", description = "CoralOS agent name for the independent challenger" }
CHALLENGE_WINDOW_MS = { type = "f64", default = 5000, description = "Optimistic challenge window after DELIVERED before release" }
AUTO_CHALLENGE_ON_FAILED_VERIFY = { type = "string", default = "1", description = "When challenger-agent is absent, buyer opens a challenge itself if objective verification fails; set 0 to only wait" }
SELLER_BOND_SOL = { type = "f64", default = 0.0001, description = "Seller bond amount used for transfer-backed L1 slash events" }
BID_WINDOW_MS = { type = "f64", default = 5000, description = "How long to collect competing bids each round" }
CYCLE_INTERVAL_MS = { type = "f64", default = 30000, description = "Delay between market rounds" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
TXLINE_API_KEY = { type = "string", default = "", description = "Activated TxLINE API token - the buyer re-executes the objective read to verify deliveries" }
TXLINE_BASE_URL = { type = "string", default = "", description = "Override the TxLINE host (defaults to txline-dev.txodds.com)" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key (default brain for best-value selection)" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key - set with LLM_PROVIDER=openai to flip the brain" }
VENICE_API_KEY = { type = "string", default = "", description = "Venice AI key (OpenAI-compatible, free credits) - set with LLM_PROVIDER=venice to flip the brain" }
DEEPSEEK_API_KEY = { type = "string", default = "", description = "DeepSeek key (OpenAI-compatible) - set with LLM_PROVIDER=deepseek to flip the brain" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai | venice | deepseek" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
TRACE = { type = "string", default = "", description = "Set to 1 to log CoralOS calls + on-chain steps (Explorer links)" }

[runtimes.docker]
image = "buyer-agent:0.1.0"
