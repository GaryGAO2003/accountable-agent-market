edition = 4

[agent]
name = "seller-hijack"
version = "0.1.0"
description = "Marketplace accountability test dummy - undercuts to win, then announces a hijacked payout wallet in its escrow terms. Reuses the seller-agent image; proves the buyer's PEP refuses a mid-thread payout swap before any deposit."
summary = "A seller that wins the auction, then swaps the escrow payout wallet mid-thread - so the demo can show the buyer's PEP pinning the expected wallet and refusing to fund, with zero SOL moving."
readme = "Exists to exercise the payout-pinning path. Bids just under the honest sellers to win the txline job, then issues ESCROW_REQUIRED naming a hijacked payout wallet (TERMS_HIJACK_WALLET=random) instead of its own - the buyer's PEP pins the expected payout wallet from operator config (EXPECTED_SELLER_WALLET) and refuses to deposit. It wins and earns nothing; no SOL moves. Same image as seller-agent; a low FLOOR_SOL + TERMS_HIJACK_WALLET + DELIVER_MODE=deliver shape it."

[agent.license]
type = "spdx"
expression = "MIT"

[options]
SELLER_WALLET = { type = "string", description = "Devnet wallet pubkey that receives payments" }
SELLER_KEYPAIR_B58 = { type = "string", default = "", description = "Base58-encoded devnet seller keypair; signs seller bond transfers" }
BOND_HOLDER_WALLET = { type = "string", default = "", description = "Wallet that temporarily holds seller bonds, usually the arbiter wallet" }
SELLER_BOND_SOL = { type = "f64", default = 0.0001, description = "Transfer-backed seller bond posted after escrow is funded; 0 disables" }
AGENT_NAME = { type = "string", default = "seller-hijack", description = "Market identity (matches the registry name)" }
SERVICES = { type = "string", default = "txline", description = "Inventory - this persona bids only on txline (TxODDS data)" }
FLOOR_SOL = { type = "f64", default = 0.00028, description = "Cost floor - undercuts the honest sellers to win, sitting just above the rogue's floor (the edge runs a real Claude call)" }
PERSONA = { type = "string", default = "an established clearing-house data vendor running a quiet volume discount: bid at or near the cost floor and write short, calm, professional notes about verified sources and reliable delivery - never sound pushy or salesy", description = "Bidding persona (LLM system prompt)" }
SERVICE = { type = "string", default = "txline", description = "What deliverService returns: txline (fixtures | odds <id> | edge <id>)" }
SOLANA_RPC_URL = { type = "string", default = "", description = "Solana RPC URL (devnet)" }
SETTLEMENT_MODE = { type = "string", default = "arbiter", description = "arbiter (default) | direct legacy base escrow" }
ESCROW_DEADLINE_SECS = { type = "f64", default = 45, description = "Refund deadline for escrow deposits (seconds)" }
DELIVER_MODE = { type = "string", default = "deliver", description = "deliver (normal) | none (win then ghost - demos the refund path) | junk (deliver an unverifiable payload)" }
TERMS_HIJACK_WALLET = { type = "string", default = "random", description = "Demo knob: announce this payout wallet in the escrow terms instead of SELLER_WALLET. '' = off | a base58 pubkey | 'random' (throwaway generated once) - the buyer's PEP should refuse to fund the swap" }
TXLINE_API_KEY = { type = "string", default = "", description = "Activated TxLINE API token (from the one-time devnet subscribe - see examples/txodds)" }
TXLINE_BASE_URL = { type = "string", default = "", description = "Override the TxLINE host (defaults to txline-dev.txodds.com)" }
ANTHROPIC_API_KEY = { type = "string", default = "", description = "Anthropic key - the edge verb runs a Claude completion" }
OPENAI_API_KEY = { type = "string", default = "", description = "OpenAI key - set with LLM_PROVIDER=openai to flip the brain" }
VENICE_API_KEY = { type = "string", default = "", description = "Venice AI key (OpenAI-compatible, free credits) - set with LLM_PROVIDER=venice to flip the brain" }
DEEPSEEK_API_KEY = { type = "string", default = "", description = "DeepSeek key (OpenAI-compatible) - set with LLM_PROVIDER=deepseek to flip the brain" }
LLM_PROVIDER = { type = "string", default = "", description = "anthropic (default) | openai | venice | deepseek" }
LLM_MODEL = { type = "string", default = "", description = "Override the LLM model id" }
INFERENCE_MODEL = { type = "string", default = "", description = "Model for the edge's Claude call (default claude-opus-4-8)" }
TRACE = { type = "string", default = "", description = "Set to 1 to log CoralOS calls + on-chain steps" }

# Reuses the already-built seller-agent image - no separate build needed.
[runtimes.docker]
image = "seller-agent:0.1.0"
